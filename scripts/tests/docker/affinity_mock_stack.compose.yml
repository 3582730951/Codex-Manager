services:
  service-test:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.service
      target: service-runtime
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_AFFINITY_ROUTING_MODE: enforce
      CODEXMANAGER_CLIENT_ENTITY_MODE: ${AFFINITY_TEST_CLIENT_ENTITY_MODE:-auto}
      CODEXMANAGER_CONTEXT_REPLAY_ENABLED: "1"
      CODEXMANAGER_DISABLE_POLLING: "1"
      CODEXMANAGER_USAGE_POLLING_ENABLED: "0"
      CODEXMANAGER_AFFINITY_SOFT_QUOTA_PERCENT: "5"
      CODEXMANAGER_PEER_RUNTIME_TRUSTED_CIDRS: ${AFFINITY_TEST_TRUSTED_PEERS:-}
      CODEXMANAGER_PEER_RUNTIME_TTL_SECS: "1800"
      CODEXMANAGER_REPLAY_MAX_TURNS: "12"
      CODEXMANAGER_ROUTE_STRATEGY: balanced
      CODEXMANAGER_TOKEN_REFRESH_POLLING_ENABLED: "0"
    volumes:
      - affinity-data:/data
    ports:
      - "${AFFINITY_SERVICE_PORT}:48760"
    networks:
      affinity-net:
        ipv4_address: ${AFFINITY_TEST_SERVICE_IP}

  web-test:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.web
    depends_on:
      service-test:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: service-test:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - affinity-data:/data
    ports:
      - "${AFFINITY_WEB_PORT}:48761"
    networks:
      affinity-net:
        ipv4_address: ${AFFINITY_TEST_WEB_IP}

  mock-upstream:
    image: python:3.12-slim
    working_dir: /workspace
    command:
      - python
      - /workspace/scripts/tests/docker/mock_affinity_upstream.py
    environment:
      MOCK_UPSTREAM_PORT: "18080"
    volumes:
      - ../../..:/workspace:ro
    networks:
      affinity-net:
        ipv4_address: ${AFFINITY_TEST_MOCK_UPSTREAM_IP}

  probe-a:
    image: python:3.12-slim
    command:
      - python
      - -c
      - "import time; time.sleep(10**9)"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      affinity-net:
        ipv4_address: ${AFFINITY_TEST_PROBE_A_IP}

  probe-b:
    image: python:3.12-slim
    command:
      - python
      - -c
      - "import time; time.sleep(10**9)"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      affinity-net:
        ipv4_address: ${AFFINITY_TEST_PROBE_B_IP}

  seed-init:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.service
      target: seed-runtime
    restart: "no"
    depends_on:
      service-test:
        condition: service_healthy
    entrypoint:
      - /usr/local/bin/mock_affinity_seed
    environment:
      AFFINITY_TEST_DB_PATH: /data/codexmanager.db
      AFFINITY_TEST_PLATFORM_KEY: ${AFFINITY_TEST_PLATFORM_KEY}
      AFFINITY_TEST_UPSTREAM_BASE: http://mock-upstream:18080
    volumes:
      - affinity-data:/data
    networks:
      - affinity-net

networks:
  affinity-net:
    ipam:
      config:
        - subnet: ${AFFINITY_TEST_NETWORK_SUBNET}

volumes:
  affinity-data:
    external: true
    name: ${AFFINITY_TEST_DATA_VOLUME}
