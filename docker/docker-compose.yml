services:
  codexmanager-warp:
    image: ${CODEXMANAGER_WARP_IMAGE:-caomingjun/warp:latest}
    restart: unless-stopped
    profiles: ["warp"]
    environment:
      WARP_SLEEP: ${CODEXMANAGER_WARP_SLEEP:-5}
      WARP_LICENSE_KEY: ${CODEXMANAGER_WARP_LICENSE_KEY:-}
    devices:
      - /dev/net/tun:/dev/net/tun
    device_cgroup_rules:
      - "c 10:200 rwm"
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - codexmanager-warp-data:/var/lib/cloudflare-warp

  codexmanager-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      target: service-runtime
    restart: unless-stopped
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_AFFINITY_ROUTING_MODE: enforce
      CODEXMANAGER_CLIENT_ENTITY_MODE: auto
      CODEXMANAGER_CONTEXT_REPLAY_ENABLED: "1"
      CODEXMANAGER_AFFINITY_SOFT_QUOTA_PERCENT: "5"
      CODEXMANAGER_REPLAY_MAX_TURNS: "12"
      CODEXMANAGER_UPSTREAM_PROXY_URL: ${CODEXMANAGER_UPSTREAM_PROXY_URL:-}
      CODEXMANAGER_GATEWAY_ACCOUNT_PROXY_URL: ${CODEXMANAGER_GATEWAY_ACCOUNT_PROXY_URL:-}
      CODEXMANAGER_GATEWAY_ACCOUNT_PROXY_MODE: ${CODEXMANAGER_GATEWAY_ACCOUNT_PROXY_MODE:-group_auto}
    volumes:
      - codexmanager-data:/data
    ports:
      - "48760:48760"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  codexmanager-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - codexmanager-data:/data
    ports:
      - "48761:48761"

volumes:
  codexmanager-data:
  codexmanager-warp-data:
