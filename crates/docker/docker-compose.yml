services:
  codexmanager-service:
    build:
      context: ../..
      dockerfile: crates/docker/Dockerfile.service
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_UPSTREAM_BASE_URL: ${CODEXMANAGER_UPSTREAM_BASE_URL:-}
      CODEXMANAGER_UPSTREAM_FALLBACK_BASE_URL: ${CODEXMANAGER_UPSTREAM_FALLBACK_BASE_URL:-}
      CODEXMANAGER_UPSTREAM_COOKIE: ${CODEXMANAGER_UPSTREAM_COOKIE:-}
      CODEXMANAGER_CPA_NO_COOKIE_HEADER_MODE: ${CODEXMANAGER_CPA_NO_COOKIE_HEADER_MODE:-}
      CODEXMANAGER_ACCOUNT_MAX_INFLIGHT: ${CODEXMANAGER_ACCOUNT_MAX_INFLIGHT:-}
      CODEXMANAGER_REQUEST_GATE_WAIT_TIMEOUT_MS: ${CODEXMANAGER_REQUEST_GATE_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_STREAM_REQUEST_GATE_WAIT_TIMEOUT_MS: ${CODEXMANAGER_STREAM_REQUEST_GATE_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_COMPACT_REQUEST_GATE_WAIT_TIMEOUT_MS: ${CODEXMANAGER_COMPACT_REQUEST_GATE_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS: ${CODEXMANAGER_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_STREAM_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS: ${CODEXMANAGER_STREAM_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_COMPACT_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS: ${CODEXMANAGER_COMPACT_ACCOUNT_INFLIGHT_WAIT_TIMEOUT_MS:-}
      CODEXMANAGER_UPSTREAM_CONNECT_TIMEOUT_SECS: ${CODEXMANAGER_UPSTREAM_CONNECT_TIMEOUT_SECS:-}
      CODEXMANAGER_UPSTREAM_TOTAL_TIMEOUT_MS: ${CODEXMANAGER_UPSTREAM_TOTAL_TIMEOUT_MS:-}
      CODEXMANAGER_UPSTREAM_STREAM_TIMEOUT_MS: ${CODEXMANAGER_UPSTREAM_STREAM_TIMEOUT_MS:-}
      CODEXMANAGER_UPSTREAM_PROXY_URL: ${CODEXMANAGER_UPSTREAM_PROXY_URL:-}
      CODEXMANAGER_PROXY_LIST: ${CODEXMANAGER_PROXY_LIST:-}
      CODEXMANAGER_ROUTE_STRATEGY: ${CODEXMANAGER_ROUTE_STRATEGY:-}
      CODEXMANAGER_ROUTE_RENDEZVOUS_TOP_K: ${CODEXMANAGER_ROUTE_RENDEZVOUS_TOP_K:-}
      CODEXMANAGER_ROUTE_ORDERED_PREFIX_WINDOW: ${CODEXMANAGER_ROUTE_ORDERED_PREFIX_WINDOW:-}
      CODEXMANAGER_ENABLE_REQUEST_COMPRESSION: ${CODEXMANAGER_ENABLE_REQUEST_COMPRESSION:-}
      CODEXMANAGER_CLIENT_ID: ${CODEXMANAGER_CLIENT_ID:-}
      CODEXMANAGER_ISSUER: ${CODEXMANAGER_ISSUER:-}
    volumes:
      - codexmanager-data:/data
    ports:
      - "48760:48760"

  codexmanager-web:
    build:
      context: ../..
      dockerfile: crates/docker/Dockerfile.web
    depends_on:
      - codexmanager-service
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - codexmanager-data:/data
    ports:
      - "48761:48761"

volumes:
  codexmanager-data:
